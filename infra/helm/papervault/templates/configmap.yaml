apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "papervault.configMapName" . }}
  labels:
    {{- include "papervault.labels" . | nindent 4 }}
data:
  PAPERVAULT_ENV: {{ .Values.config.environment | quote }}
  PAPERVAULT_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  PAPERVAULT_API_CORS_ORIGINS: {{ .Values.config.corsOrigins | quote }}
  PAPERVAULT_MAX_UPLOAD_SIZE_BYTES: {{ .Values.config.maxUploadSizeBytes | quote }}
  PAPERVAULT_AI_ENABLED: {{ .Values.config.aiEnabled | quote }}
  PAPERVAULT_AI_PROVIDER: {{ .Values.config.aiProvider | quote }}
  PAPERVAULT_ANSWER_PROVIDER: {{ .Values.config.answerProvider | quote }}
  PAPERVAULT_EMBEDDING_PROVIDER: {{ .Values.config.embeddingProvider | quote }}
  PAPERVAULT_EMBEDDING_DIMENSIONS: {{ .Values.config.embeddingDimensions | quote }}
  PAPERVAULT_AI_CLASSIFICATION_THRESHOLD: {{ .Values.config.aiClassificationThreshold | quote }}
  PAPERVAULT_METADATA_LOCALE: {{ .Values.config.metadataLocale | quote }}
  PAPERVAULT_MODEL_PROVIDER_TIMEOUT_SECONDS: {{ .Values.config.modelProviderTimeoutSeconds | quote }}
  PAPERVAULT_OLLAMA_BASE_URL: {{ .Values.config.ollamaBaseUrl | quote }}
  PAPERVAULT_OLLAMA_CHAT_MODEL: {{ .Values.config.ollamaChatModel | quote }}
  PAPERVAULT_OLLAMA_EMBEDDING_MODEL: {{ .Values.config.ollamaEmbeddingModel | quote }}
  PAPERVAULT_OPENAI_COMPATIBLE_BASE_URL: {{ .Values.config.openaiCompatibleBaseUrl | quote }}
  PAPERVAULT_OPENAI_COMPATIBLE_CHAT_MODEL: {{ .Values.config.openaiCompatibleChatModel | quote }}
  PAPERVAULT_OPENAI_COMPATIBLE_EMBEDDING_MODEL: {{ .Values.config.openaiCompatibleEmbeddingModel | quote }}
  PAPERVAULT_AUTH_ALLOW_DEV_HEADERS: {{ .Values.config.authAllowDevHeaders | quote }}
  PAPERVAULT_LOCAL_AUTH_ENABLED: {{ .Values.config.localAuthEnabled | quote }}
  PAPERVAULT_LOCAL_REGISTRATION_ENABLED: {{ .Values.config.localRegistrationEnabled | quote }}
  JWT_ISSUER: {{ .Values.config.jwtIssuer | quote }}
  JWT_AUDIENCE: {{ .Values.config.jwtAudience | quote }}
  JWT_ACCESS_TOKEN_MINUTES: {{ .Values.config.jwtAccessTokenMinutes | quote }}
  PAPERVAULT_WEB_APP_URL: {{ .Values.config.webAppUrl | quote }}
  PAPERVAULT_OCR_PROVIDER: {{ .Values.config.ocrProvider | quote }}
  PAPERVAULT_OCR_LANGUAGES: {{ .Values.config.ocrLanguages | quote }}
  PAPERVAULT_OCR_TIMEOUT_SECONDS: {{ .Values.config.ocrTimeoutSeconds | quote }}
  PAPERVAULT_OCR_PDF_DPI: {{ .Values.config.ocrPdfDpi | quote }}
  PAPERVAULT_OCR_MAX_PDF_PAGES: {{ .Values.config.ocrMaxPdfPages | quote }}
  PAPERVAULT_SEARCH_INDEX_ENABLED: {{ .Values.config.searchIndexEnabled | quote }}
  PAPERVAULT_SEARCH_QUERY_BACKEND: {{ .Values.config.searchQueryBackend | quote }}
  PAPERVAULT_SEARCH_QUERY_FALLBACK_ENABLED: {{ .Values.config.searchQueryFallbackEnabled | quote }}
  S3_ENDPOINT_URL: {{ .Values.config.s3EndpointUrl | quote }}
  S3_BUCKET_DOCUMENTS: {{ .Values.config.s3BucketDocuments | quote }}
  S3_REGION: {{ .Values.config.s3Region | quote }}
  OPENSEARCH_URL: {{ .Values.config.opensearchUrl | quote }}
  OPENSEARCH_DOCUMENTS_INDEX: {{ .Values.config.opensearchDocumentsIndex | quote }}
  OPENSEARCH_TIMEOUT_SECONDS: {{ .Values.config.opensearchTimeoutSeconds | quote }}
  OIDC_ISSUER_URL: {{ .Values.config.oidcIssuerUrl | quote }}
  OIDC_CLIENT_ID: {{ .Values.config.oidcClientId | quote }}
  OIDC_REDIRECT_URI: {{ .Values.config.oidcRedirectUri | quote }}
  OIDC_SCOPES: {{ .Values.config.oidcScopes | quote }}
  OIDC_STATE_TTL_SECONDS: {{ .Values.config.oidcStateTtlSeconds | quote }}
  OIDC_HTTP_TIMEOUT_SECONDS: {{ .Values.config.oidcHttpTimeoutSeconds | quote }}
  OTEL_SERVICE_NAME: {{ .Values.config.otelServiceName | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.config.otelExporterOtlpEndpoint | quote }}
