apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "papervault.fullname" . }}-config
  labels:
    app.kubernetes.io/name: {{ include "papervault.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  PAPERVAULT_ENV: {{ .Values.config.environment | quote }}
  PAPERVAULT_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  PAPERVAULT_AUTH_ALLOW_DEV_HEADERS: {{ .Values.config.authAllowDevHeaders | quote }}
  PAPERVAULT_LOCAL_AUTH_ENABLED: {{ .Values.config.localAuthEnabled | quote }}
  PAPERVAULT_LOCAL_REGISTRATION_ENABLED: {{ .Values.config.localRegistrationEnabled | quote }}
