{{- if .Values.tests.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "papervault.fullname" . }}-smoke
  labels:
    {{- include "papervault.labels" . | nindent 4 }}
    app.kubernetes.io/component: smoke-test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  serviceAccountName: {{ include "papervault.serviceAccountName" . }}
  {{- with .Values.imagePullSecrets }}
  imagePullSecrets:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  securityContext:
    {{- toYaml .Values.podSecurityContext.api | nindent 4 }}
  containers:
    - name: smoke
      image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
      imagePullPolicy: {{ .Values.image.api.pullPolicy }}
      securityContext:
        {{- toYaml .Values.containerSecurityContext.api | nindent 8 }}
      command:
        - python
        - -c
        - |
          import json
          import urllib.request

          url = "http://{{ include "papervault.fullname" . }}-api:{{ .Values.service.api.port }}/health"
          with urllib.request.urlopen(url, timeout=10) as response:
              payload = json.loads(response.read().decode("utf-8"))
          assert payload["status"] == "ok", payload
          print(json.dumps(payload, sort_keys=True))
      resources:
        {{- toYaml .Values.resources.api | nindent 8 }}
{{- end }}
