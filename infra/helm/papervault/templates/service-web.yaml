apiVersion: v1
kind: Service
metadata:
  name: {{ include "papervault.fullname" . }}-web
  labels:
    {{- include "papervault.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.service.web.type }}
  ports:
    - name: http
      port: {{ .Values.service.web.port }}
      targetPort: http
  selector:
    {{- include "papervault.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
