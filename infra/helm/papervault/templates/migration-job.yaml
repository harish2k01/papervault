{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "papervault.fullname" . }}-migrate
  labels:
    {{- include "papervault.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  {{- if .Values.migrations.useHelmHooks }}
  annotations:
    "helm.sh/hook": {{ .Values.migrations.hookEvents | quote }}
    "helm.sh/hook-delete-policy": {{ .Values.migrations.hookDeletePolicy | quote }}
  {{- end }}
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migrations.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: {{ .Values.migrations.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "papervault.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "papervault.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext.api | nindent 8 }}
      containers:
        - name: migrate
          image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          {{- if .Values.migrations.waitForDatabase }}
          command:
            - sh
            - -c
            - python -m papervault_api.db.wait_for_database && alembic upgrade head
          {{- else }}
          command: ["alembic", "upgrade", "head"]
          {{- end }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext.api | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "papervault.configMapName" . }}
            - secretRef:
                name: {{ include "papervault.secretName" . }}
          env:
            - name: PAPERVAULT_DATABASE_READY_TIMEOUT_SECONDS
              value: {{ .Values.migrations.databaseReadyTimeoutSeconds | quote }}
            - name: PAPERVAULT_DATABASE_READY_INTERVAL_SECONDS
              value: {{ .Values.migrations.databaseReadyIntervalSeconds | quote }}
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}
{{- end }}
