{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "papervault.secretName" . }}
  labels:
    {{- include "papervault.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secret.values.databaseUrl | quote }}
  REDIS_URL: {{ .Values.secret.values.redisUrl | quote }}
  S3_ACCESS_KEY_ID: {{ .Values.secret.values.s3AccessKeyId | quote }}
  S3_SECRET_ACCESS_KEY: {{ .Values.secret.values.s3SecretAccessKey | quote }}
  JWT_SIGNING_KEY: {{ .Values.secret.values.jwtSigningKey | quote }}
  OPENSEARCH_USERNAME: {{ .Values.secret.values.opensearchUsername | quote }}
  OPENSEARCH_PASSWORD: {{ .Values.secret.values.opensearchPassword | quote }}
  OIDC_CLIENT_SECRET: {{ .Values.secret.values.oidcClientSecret | quote }}
  {{- if .Values.labDependencies.enabled }}
  POSTGRES_USER: {{ .Values.labDependencies.postgres.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.labDependencies.postgres.password | quote }}
  POSTGRES_DB: {{ .Values.labDependencies.postgres.database | quote }}
  MINIO_ROOT_USER: {{ .Values.labDependencies.minio.rootUser | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.labDependencies.minio.rootPassword | quote }}
  {{- end }}
{{- end }}
