nameOverride: ""
fullnameOverride: ""

replicaCount:
  api: 1
  worker: 1
  web: 1

image:
  api:
    repository: ghcr.io/example/papervault-api
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  worker:
    repository: ghcr.io/example/papervault-worker
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  web:
    repository: ghcr.io/example/papervault-web
    tag: "0.1.0"
    pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  api:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  worker:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  web:
    fsGroup: 10001
    runAsNonRoot: true
    runAsGroup: 10001
    runAsUser: 10001
    seccompProfile:
      type: RuntimeDefault

containerSecurityContext:
  api:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  worker:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  web:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

config:
  environment: production
  logLevel: INFO
  corsOrigins: https://papervault.example.com
  maxUploadSizeBytes: "104857600"
  aiEnabled: "true"
  aiProvider: local
  answerProvider: local
  embeddingProvider: local
  embeddingDimensions: "64"
  aiClassificationThreshold: "0.55"
  duplicateContentSimilarityThreshold: "0.88"
  duplicateOcrSimilarityThreshold: "0.84"
  duplicateSimilarityMinTokens: "24"
  metadataLocale: en-IN
  modelProviderTimeoutSeconds: "60"
  ollamaBaseUrl: http://ollama:11434
  ollamaChatModel: llama3.2
  ollamaEmbeddingModel: nomic-embed-text
  openaiCompatibleBaseUrl: https://api.openai.com/v1
  openaiCompatibleChatModel: gpt-4.1-mini
  openaiCompatibleEmbeddingModel: text-embedding-3-small
  authAllowDevHeaders: "false"
  localAuthEnabled: "true"
  localRegistrationEnabled: "false"
  jwtIssuer: papervault
  jwtAudience: papervault-web
  jwtAccessTokenMinutes: "60"
  webAppUrl: https://papervault.example.com
  ocrProvider: tesseract
  ocrLanguages: eng
  ocrTimeoutSeconds: "120"
  ocrPdfDpi: "200"
  ocrMaxPdfPages: "50"
  searchIndexEnabled: "true"
  searchQueryBackend: opensearch
  searchQueryFallbackEnabled: "true"
  s3EndpointUrl: http://minio:9000
  s3BucketDocuments: documents
  s3Region: us-east-1
  opensearchUrl: http://opensearch:9200
  opensearchDocumentsIndex: papervault-documents-v1
  opensearchTimeoutSeconds: "5"
  oidcIssuerUrl: ""
  oidcClientId: ""
  oidcRedirectUri: ""
  oidcScopes: openid email profile
  oidcStateTtlSeconds: "600"
  oidcHttpTimeoutSeconds: "5"
  otelServiceName: papervault-api
  otelExporterOtlpEndpoint: ""

secret:
  create: true
  existingSecret: ""
  values:
    databaseUrl: postgresql+asyncpg://papervault:papervault@postgres:5432/papervault
    redisUrl: redis://redis:6379/0
    s3AccessKeyId: papervault
    s3SecretAccessKey: papervault-secret
    jwtSigningKey: change-me-in-production
    opensearchUsername: ""
    opensearchPassword: ""
    oidcClientSecret: ""
    openaiCompatibleApiKey: ""

service:
  api:
    type: ClusterIP
    port: 8000
  web:
    type: ClusterIP
    port: 80

ingress:
  api:
    enabled: false
    className: ""
    annotations: {}
    host: api.papervault.example.com
    tls: []
  web:
    enabled: false
    className: ""
    annotations: {}
    host: papervault.example.com
    tls: []

gateway:
  httpRoute:
    enabled: false
    gatewayName: traefik-gateway
    gatewayNamespace: traefik
    sectionName: websecure
    hostnames: []
    api:
      pathPrefix: /api
      rewritePrefix: /
    web:
      pathPrefix: /

migrations:
  enabled: true
  useHelmHooks: true
  hookEvents: pre-install,pre-upgrade
  hookDeletePolicy: before-hook-creation,hook-succeeded
  backoffLimit: 3
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 86400
  waitForDatabase: true
  databaseReadyTimeoutSeconds: "120"
  databaseReadyIntervalSeconds: "2"

tests:
  enabled: true

resources:
  api: {}
  worker: {}
  web: {}

labDependencies:
  enabled: false
  postgres:
    image: postgres:17-alpine
    storageSize: 5Gi
    username: papervault
    password: papervault
    database: papervault
  redis:
    image: redis:7.4-alpine
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    mcImage: minio/mc:RELEASE.2025-04-16T18-13-26Z
    storageSize: 10Gi
    rootUser: papervault
    rootPassword: papervault-secret
    bucket: documents
  opensearch:
    enabled: false
    image: opensearchproject/opensearch:2.19.1
    storageSize: 10Gi
    javaOpts: -Xms512m -Xmx512m
    initialAdminPassword: PaperVault-Lab-Password1!

external:
  postgres:
    enabled: true
  redis:
    enabled: true
  objectStorage:
    enabled: true
  search:
    enabled: true
