server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location ~* \.mjs$ {
    types { application/javascript mjs; }
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /health {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
